# ============================================
# Course RAG Pipeline — Docker Compose
# ============================================
# Usage:
#   docker compose up -d          # start
#   docker compose logs -f        # view logs
#   docker compose down           # stop
#   docker compose up -d --build  # rebuild & restart

services:
  courserag:
    build: .
    container_name: courserag
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persistent data — survives container rebuilds
      - ./data:/app/data
      - ./credentials:/app/credentials
    environment:
      - PYTHONPATH=/app
      # Override paths for containerized context
      - CHROMA_PERSIST_DIR=data/chroma_db
      - GOOGLE_CREDENTIALS_PATH=credentials/oauth_credentials.json
      - GOOGLE_TOKEN_PATH=credentials/token.pickle
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
